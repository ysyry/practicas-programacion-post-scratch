<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Práctica de programación · Post Scratch</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--card2:#273449;--txt:#e2e8f0;--muted:#94a3b8;
    --accent:#38bdf8;--good:#34d399;--bad:#f87171;--warn:#fbbf24;--b1:#a78bfa;--b2:#f472b6}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:linear-gradient(160deg,#0f172a,#1e1b4b);color:var(--txt);min-height:100vh}
  header{padding:16px;text-align:center;position:relative}
  header h1{margin:0;font-size:1.5rem;background:linear-gradient(90deg,var(--accent),var(--b1),var(--b2));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  header p{margin:4px 0 0;color:var(--muted);font-size:.85rem}
  .wrap{max-width:720px;margin:0 auto;padding:8px 16px 60px}
  .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 30px rgba(0,0,0,.3);margin-bottom:16px}
  h2{margin:.1em 0 .5em;font-size:1.25rem}
  h3{font-size:1.05rem;margin:.2em 0}
  .muted{color:var(--muted)}
  /* menu de salas */
  .salas{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:540px){.salas{grid-template-columns:1fr}}
  .sala{background:var(--card2);border:2px solid transparent;border-radius:14px;padding:16px;cursor:pointer;
    transition:.15s;text-align:left;color:var(--txt);font-family:inherit}
  .sala:hover{border-color:var(--accent);transform:translateY(-2px)}
  .sala .emoji{font-size:1.8rem}
  .sala .nom{font-weight:700;font-size:1.02rem;margin:6px 0 2px}
  .sala .desc{font-size:.8rem;color:var(--muted)}
  .sala .prog{font-size:.74rem;color:var(--good);margin-top:8px;font-weight:700}
  .sala.mezcla{grid-column:1/-1;background:linear-gradient(90deg,rgba(56,189,248,.15),rgba(167,139,250,.15));
    border:1px solid #3a4a63}
  .concepto{display:inline-block;background:rgba(167,139,250,.18);color:var(--b1);border:1px solid rgba(167,139,250,.4);
    border-radius:99px;padding:3px 11px;font-size:.72rem;font-weight:800;letter-spacing:.4px;text-transform:uppercase;margin-top:8px}
  .concepto.big{font-size:.78rem;margin:0 0 12px}
  /* barra superior de ejercicio */
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .backb{background:var(--card2);color:var(--txt);border:1px solid #3a4a63;border-radius:99px;
    padding:8px 14px;font-size:.85rem;cursor:pointer;font-family:inherit}
  .backb:hover{border-color:var(--accent)}
  .progtext{margin-left:auto;font-size:.82rem;color:var(--muted)}
  .score{font-weight:800;color:var(--warn)}
  .bar{height:8px;background:#0b1220;border-radius:99px;overflow:hidden;margin-bottom:16px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--b1));transition:.3s;width:0}
  /* consigna y codigo */
  .consigna{font-size:1.05rem;font-weight:600;margin-bottom:12px;line-height:1.4}
  .code,.cblock{background:#0b1220;border:1px solid #334155;border-radius:12px;padding:14px 16px;
    font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.95rem;line-height:1.7;
    color:#e2e8f0;overflow-x:auto;margin:12px 0}
  .code{white-space:pre}
  .cline{white-space:pre;border-radius:6px;padding:0 6px;margin:0 -6px;transition:.15s}
  .cline.hot{background:rgba(251,191,36,.22);box-shadow:inset 3px 0 0 var(--warn)}
  .kw{color:var(--b1);font-weight:700}
  .num{color:var(--warn)}
  .str{color:var(--good)}
  .cmt{color:var(--muted)}
  .blank{color:var(--accent);font-weight:800}
  /* opciones */
  .opts{display:grid;gap:10px;margin-top:6px}
  button.opt{background:var(--card2);color:var(--txt);border:2px solid transparent;border-radius:12px;
    padding:14px;font-size:1rem;text-align:left;cursor:pointer;transition:.12s;font-family:inherit;line-height:1.4}
  button.opt:hover:not(:disabled){border-color:var(--accent)}
  button.opt.ok{border-color:var(--good);background:rgba(52,211,153,.15)}
  button.opt.no{border-color:var(--bad);background:rgba(248,113,113,.13)}
  button.opt:disabled{cursor:default;opacity:.9}
  button.opt.mono{font-family:ui-monospace,Menlo,monospace;font-size:.92rem;white-space:pre}
  /* ordenar (parsons) */
  .parsons{display:grid;gap:16px}
  @media(min-width:640px){.parsons{grid-template-columns:1fr 1fr}}
  .pcol h4{margin:0 0 8px;font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .pbin,.pbuild{min-height:60px;background:#0b1220;border:1px dashed #3a4a63;border-radius:12px;padding:8px;
    display:flex;flex-direction:column;gap:8px}
  .pbuild{border-style:solid;border-color:#334155}
  .pline{background:var(--card2);border:1px solid #3a4a63;border-radius:10px;padding:11px 12px;cursor:pointer;
    font-family:ui-monospace,Menlo,monospace;font-size:.9rem;white-space:pre;transition:.12s}
  .pline:hover{border-color:var(--accent)}
  .pline.locked{cursor:default}
  .pline.okline{border-color:var(--good);background:rgba(52,211,153,.12)}
  .pline.noline{border-color:var(--bad);background:rgba(248,113,113,.12)}
  .emptyhint{color:var(--muted);font-size:.82rem;text-align:center;padding:14px 6px}
  /* ESCENARIO (animacion) */
  .stage{background:#0b1220;border:1px solid #334155;border-radius:14px;padding:12px;margin-top:6px}
  .sttitle{font-size:.85rem;font-weight:800;color:var(--accent);margin:2px 0 8px}
  .stcanvas{width:100%;max-width:340px;height:auto;display:block;margin:6px auto;background:#0a0f1c;
    border-radius:10px;border:1px solid #1e293b}
  .vpanel{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px;min-height:26px}
  .vchip{background:var(--card2);border:1px solid #3a4a63;border-radius:8px;padding:5px 10px;font-size:.86rem;
    font-family:ui-monospace,Menlo,monospace;transition:.15s}
  .vchip.chg{border-color:var(--warn);background:rgba(251,191,36,.15);transform:scale(1.06)}
  .vchip b{color:var(--warn)}
  .out{background:#05080f;border:1px solid #1e293b;border-radius:8px;padding:8px 12px;margin:8px 0 4px;
    font-family:ui-monospace,Menlo,monospace;font-size:.88rem;color:var(--good);min-height:20px}
  .runctrl{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .rbtn{background:linear-gradient(90deg,var(--accent),var(--b1));color:#0f172a;font-weight:800;border:none;
    border-radius:10px;padding:9px 14px;font-size:.9rem;cursor:pointer;font-family:inherit}
  .rbtn.ghost{background:var(--card2);color:var(--txt);border:1px solid #3a4a63}
  .cbhdr{font-size:.78rem;font-weight:800;color:var(--b2);margin:2px 0 6px;letter-spacing:.2px}
  .slider{width:100%;accent-color:var(--accent);margin:2px 0 10px;cursor:pointer}
  .hint{background:rgba(251,191,36,.1);border-left:3px solid var(--warn);padding:9px 12px;border-radius:8px;font-size:.88rem;margin:10px 0}
  /* modo Jr (accesible, nivel ScratchJr) */
  .jrwrap{text-align:center}
  .jrgrid{display:grid;gap:6px;justify-content:center;margin:14px auto}
  .jrcell{width:56px;height:56px;border-radius:12px;background:#0b1220;border:1px solid #334155;display:flex;align-items:center;justify-content:center;font-size:2rem}
  .jrcell.goal{background:rgba(251,191,36,.14);border-color:var(--warn)}
  .jrcell.wall{background:#3a2a20;border-color:#5a4030}
  .jrstrip{min-height:52px;background:#0b1220;border:1px dashed #3a4a63;border-radius:12px;padding:8px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center;margin:10px 0;font-size:1.8rem}
  .jrbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:6px 0}
  .jrbtn{font-size:1.9rem;width:72px;height:64px;border-radius:16px;border:2px solid #3a4a63;background:var(--card2);color:var(--txt);cursor:pointer;transition:.1s}
  .jrbtn:active{transform:scale(.92)}
  .jrgo{font-size:1.3rem;font-weight:800;padding:14px 24px;border-radius:16px;border:none;background:linear-gradient(90deg,var(--good),var(--accent));color:#0f172a;cursor:pointer}
  .jrgo:active{transform:scale(.96)}
  .jrmsg{font-size:1.4rem;font-weight:800;margin:8px 0;min-height:34px}
  /* diagramas de flujo */
  .flow{background:#0b1220;border:1px solid #334155;border-radius:12px;padding:12px;margin:12px 0;text-align:center}
  .flowsvg{width:100%;max-width:330px;height:auto}
  .flowsvg text{fill:#e2e8f0;font:600 12px system-ui,sans-serif;text-anchor:middle;dominant-baseline:middle}
  .flowsvg .lbl{fill:#94a3b8;font:700 11px system-ui,sans-serif}
  .flowsvg .sh,.flowsvg .io{fill:#273449;stroke:#38bdf8;stroke-width:2}
  .flowsvg .dec{fill:#2b2350;stroke:#a78bfa;stroke-width:2}
  .flowsvg .se{fill:#123a34;stroke:#34d399;stroke-width:2}
  .flowsvg .ln{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#ar)}
  /* botones grandes */
  .btn{background:linear-gradient(90deg,var(--accent),var(--b1));color:#0f172a;font-weight:800;border:none;
    border-radius:12px;padding:14px;font-size:1.02rem;cursor:pointer;width:100%;margin-top:14px;font-family:inherit}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.ghost{background:var(--card2);color:var(--txt);border:1px solid #3a4a63}
  /* feedback */
  .fb{border-radius:12px;padding:14px;margin-top:14px;font-size:.95rem;line-height:1.5;animation:pop .2s}
  .fb.good{background:rgba(52,211,153,.13);border-left:4px solid var(--good)}
  .fb.bad{background:rgba(248,113,113,.13);border-left:4px solid var(--bad)}
  .fb .t{font-weight:800;display:block;margin-bottom:3px}
  @keyframes pop{from{transform:scale(.97);opacity:.4}to{transform:scale(1);opacity:1}}
  /* fin de sala */
  .final{text-align:center;padding:10px}
  .final .big{font-size:3.4rem;margin:6px}
  .final .med{font-size:1.4rem;font-weight:800;margin:8px 0}
  .final .sub{color:var(--muted);margin-bottom:16px}
  .streak{font-size:.8rem;color:var(--b2);font-weight:700}
</style>
</head>
<body>
<header>
  <h1>🚀 Práctica de programación</h1>
  <p>Lo que aprendiste en Scratch… ¡ahora leyendo código!</p>
</header>
<div class="wrap" id="app"></div>

<script>
/* ============================================================
   PRÁCTICA DE PROGRAMACIÓN (POST SCRATCH) — Educación Informática
   Para 1ro y 2do (se le van agregando salas). Un único archivo,
   sin dependencias. Todo corre en el navegador.
   Los pibes leen pseudocódigo en castellano (puente Scratch->texto)
   y practican secuencia, bucles, condicionales, variables y debug.
   Autocorregido + ESCENARIO animado que ejecuta el código.
   ============================================================ */

/* -------- coloreado simple de pseudocódigo -------- */
const KW = ['repetir','veces','si','entonces','sino','mientras','mostrar','decir','esperar',
  'avanzar','girar','rebotar','al','hacer','clic','en','por','siempre','segundos','tocar','fin','grados','y','o','distinto'];
function paint(code){
  let s = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s = s.replace(/"([^"]*)"/g,'<span class="str">"$1"</span>');
  s = s.replace(/(#[^\n]*)/g,'<span class="cmt">$1</span>');
  s = s.replace(/___/g,'<span class="blank">___</span>');
  s = s.replace(/\b(\d+)\b/g,'<span class="num">$1</span>');
  KW.forEach(k=>{ s = s.replace(new RegExp('(?<![\\w])'+k+'(?![\\w])','g'),'<span class="kw">'+k+'</span>'); });
  return s;
}

/* ============================================================
   DIAGRAMAS DE FLUJO (SVG) — helpers y figuras
   ============================================================ */
function _svgWrap(w,h,inner){
  return `<svg viewBox="0 0 ${w} ${h}" class="flowsvg" xmlns="http://www.w3.org/2000/svg">`+
    `<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">`+
    `<path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker></defs>${inner}</svg>`;
}
function _fTxt(x,y,t){ return t?`<text x="${x}" y="${y+1}">${escapeHtml(t)}</text>`:''; }
function _fRect(cx,cy,w,h,txt,cls){ return `<rect class="${cls||'sh'}" x="${cx-w/2}" y="${cy-h/2}" width="${w}" height="${h}" rx="7"/>`+_fTxt(cx,cy,txt); }
function _fPill(cx,cy,w,h,txt){ return `<rect class="se" x="${cx-w/2}" y="${cy-h/2}" width="${w}" height="${h}" rx="${h/2}"/>`+_fTxt(cx,cy,txt); }
function _fDia(cx,cy,w,h,txt){ return `<polygon class="dec" points="${cx},${cy-h/2} ${cx+w/2},${cy} ${cx},${cy+h/2} ${cx-w/2},${cy}"/>`+_fTxt(cx,cy,txt); }
function _fLn(x1,y1,x2,y2){ return `<path class="ln" d="M${x1},${y1} L${x2},${y2}"/>`; }
function _fPoly(d){ return `<path class="ln" d="M${d}"/>`; }
function _fLbl(x,y,t){ return `<text class="lbl" x="${x}" y="${y}">${t}</text>`; }
function flowLinear(items){
  const W=300,bw=190,bh=34,gap=26,x=W/2; let y=14, parts=[];
  items.forEach((it,i)=>{ const cy=y+bh/2;
    if(i>0) parts.push(_fLn(x,y-gap,x,y));
    parts.push(it.f==='pill'?_fPill(x,cy,150,bh,it.txt):_fRect(x,cy,bw,bh,it.txt,it.f==='io'?'io':'sh'));
    y+=bh+gap; });
  return _svgWrap(W,y-gap+10,parts.join(''));
}
const FLOW_SHAPES = _svgWrap(330,92,
  _fPill(48,32,72,26,'')+_fLbl(48,74,'óvalo')+
  _fRect(140,32,74,26,'','sh')+_fLbl(140,74,'rectángulo')+
  _fDia(232,32,58,36,'')+_fLbl(232,74,'rombo')+
  _fLn(286,32,322,32)+_fLbl(304,74,'flecha')
);
const FLOW_PARIMPAR = (function(){
  const p=[];
  p.push(_fPill(130,24,130,30,'Inicio'));
  p.push(_fLn(130,39,130,66));
  p.push(_fRect(130,84,150,32,'leer número','io'));
  p.push(_fLn(130,100,130,120));
  p.push(_fDia(130,158,140,74,'¿es par?'));
  p.push(_fLbl(118,214,'Sí'));
  p.push(_fLn(130,195,130,224));
  p.push(_fRect(130,242,132,32,'mostrar "es par"'));
  p.push(_fLn(130,258,130,290));
  p.push(_fLbl(206,148,'No'));
  p.push(_fLn(200,158,214,158));
  p.push(_fRect(266,158,104,32,'mostrar "es impar"'));
  p.push(_fPoly('266,174 L266,304 L130,304'));
  p.push(_fPill(130,306,120,30,'Fin'));
  return _svgWrap(320,328,p.join(''));
})();

/* ============================================================
   BANCO DE EJERCICIOS
   type: 'order' | 'mc' | 'fill' | 'bug'  (+ svg opcional: diagrama)
   ============================================================ */
const SALAS = [
  {
    id:'sec', emoji:'🧩', nom:'Ordená el código', desc:'Poné las instrucciones en el orden correcto',
    concepto:'Secuencia',
    ejs:[
      { type:'order',
        consigna:'El gato tiene que saludar cuando arranca el programa. Ordená las instrucciones.',
        correcto:['al hacer clic en 🟢','decir "Hola"','esperar 2 segundos','decir "Chau"'],
        explica:'Primero el evento que arranca todo (al hacer clic), y después las acciones en orden: saluda, espera y se despide.' },
      { type:'order',
        consigna:'Querés atrapar la manzana: acercarte y sumar un punto. Ordená los pasos.',
        correcto:['al hacer clic en 🟢','apuntar hacia la manzana','avanzar 50','decir "¡Atrapada!"','puntos = puntos + 1'],
        explica:'Primero apuntás, después avanzás (si no, vas para cualquier lado), atrapás y recién ahí sumás el punto.' },
      { type:'order',
        consigna:'El personaje del laberinto tiene que dar un paso y girar. Ordená. (Probá tu orden con ▶ para ver el recorrido)',
        correcto:['avanzar 100','girar 90 grados','avanzar 100','girar 90 grados'],
        explica:'La secuencia importa: avanzar y girar, avanzar y girar. Si cambiás el orden, el recorrido es otro.' },
      { type:'order',
        consigna:'Programa que arranca el juego: poné el marcador en cero y mostrá el mensaje de inicio.',
        correcto:['al hacer clic en 🟢','puntos = 0','decir "¡Empezó el juego!"'],
        explica:'Siempre conviene poner las variables en su valor inicial (puntos = 0) antes de empezar a jugar.' },
      { type:'order',
        consigna:'Hacé que el personaje dibuje una escalera: subí, girá, subí, girá, subí. Ordená y probá con ▶.',
        correcto:['avanzar 100','girar 90 grados','avanzar 100','girar 90 grados','avanzar 100'],
        explica:'Cada "avanzar/girar" agrega un tramo. Con ▶ ves el recorrido que dibuja tu orden.' },
    ]
  },
  {
    id:'alg', emoji:'🧭', nom:'Algoritmos', desc:'¿Qué es un algoritmo? Ordená pasos para resolver algo',
    concepto:'Algoritmo',
    ejs:[
      { type:'mc', consigna:'¿Qué es un algoritmo?',
        opts:['Una serie de pasos ordenados para resolver un problema','Un lenguaje de programación','Una parte de la computadora','Un error en el programa'], correcta:0,
        explica:'Un algoritmo es una secuencia de pasos, en orden y sin ambigüedad, que resuelve un problema. ¡Una receta también es un algoritmo!' },
      { type:'mc', consigna:'¿Cuál de estas cosas NO es un algoritmo?',
        opts:['La foto de un paisaje','Una receta de cocina','Los pasos para armar un mueble','Las instrucciones para llegar a la escuela'], correcta:0,
        explica:'Una foto no describe pasos. Las recetas e instrucciones SÍ son algoritmos: dicen qué hacer y en qué orden.' },
      { type:'order', consigna:'Ordená el algoritmo para preparar un mate 🧉',
        correcto:['calentar el agua','poner la yerba en el mate','servir el agua caliente','tomar el mate'],
        explica:'Un algoritmo tiene los pasos en orden. Si servís el agua antes de poner la yerba… no sale mate.' },
      { type:'order', consigna:'Ordená el algoritmo para mandar un mensaje 📱',
        correcto:['desbloquear el teléfono','abrir la app de mensajes','elegir el contacto','escribir el mensaje','tocar enviar'],
        explica:'Cada paso depende del anterior: no podés escribir el mensaje sin abrir la app primero.' },
      { type:'mc', consigna:'Un buen algoritmo tiene que tener los pasos…',
        opts:['en orden y sin dejar lugar a dudas','desordenados','lo más largos posible','en otro idioma'], correcta:0,
        explica:'Claridad y orden: cada paso bien definido para que siempre dé el mismo resultado.' },
      { type:'mc', consigna:'¿Qué es un PROGRAMA?',
        opts:['Un algoritmo escrito para que la computadora lo ejecute','Un dibujo','Una página de internet','Un archivo de música'], correcta:0,
        explica:'Un programa es un algoritmo escrito en un lenguaje que la compu entiende. Nosotros lo escribimos (programamos) y la computadora lo ejecuta paso a paso.' },
      { type:'mc', consigna:'Escribo estas instrucciones y la compu las ejecuta y me muestra 7. ¿Cómo se llama eso?',
        code:'a = 3\nb = 4\nmostrar a + b',
        opts:['Un programa','Un algoritmo desordenado','Un error','Una foto'], correcta:0,
        explica:'¡Es un programa! Vos lo escribís y la computadora lo ejecuta línea por línea: guarda 3, guarda 4 y muestra la suma (7). Eso es programar.' },
    ]
  },
  {
    id:'flow', emoji:'🔷', nom:'Diagramas de flujo', desc:'Leé algoritmos dibujados con figuras y flechas',
    concepto:'Diagrama de flujo',
    ejs:[
      { type:'mc', consigna:'Un diagrama de flujo dibuja un algoritmo. ¿Qué figura representa una DECISIÓN (una pregunta con Sí/No)?',
        svg: FLOW_SHAPES,
        opts:['El rombo','El rectángulo','El óvalo','La flecha'], correcta:0,
        explica:'El rombo es la decisión: de él salen dos caminos (Sí / No). El rectángulo es una acción, el óvalo el inicio/fin y la flecha marca el orden.' },
      { type:'mc', consigna:'Este diagrama es el algoritmo para preparar un mate. ¿Qué paso viene justo después de "calentar el agua"?',
        svg: flowLinear([{f:'pill',txt:'Inicio'},{f:'sh',txt:'calentar el agua'},{f:'sh',txt:'poner la yerba'},{f:'sh',txt:'servir el agua'},{f:'pill',txt:'Fin'}]),
        opts:['poner la yerba','servir el agua','calentar el agua','Fin'], correcta:0,
        explica:'Las flechas marcan el orden: después de "calentar el agua" viene "poner la yerba". El diagrama muestra el algoritmo paso a paso.' },
      { type:'mc', consigna:'Seguí el diagrama con el dedo. Si el número es 7, ¿qué muestra?',
        svg: FLOW_PARIMPAR,

/* ============================================================
   MOTOR: parsear + simular pseudocódigo -> frames de animación
   ============================================================ */
function lexExpr(s){
  const out=[]; const re=/("[^"]*"|>=|<=|==|!=|[()+\-*/%<>=]|[A-Za-zÁÉÍÓÚáéíóúñÑ_]\w*|\d+\.\d+|\d+)/g;
  let m; while(m=re.exec(s)) out.push(m[0]); return out;
}
function truthy(v){ return !(v===false||v===0||v===''||v==null); }
function showVal(v){ return typeof v==='boolean' ? (v?'verdadero':'falso') : String(v); }
/* evaluador con precedencia: o < y < comparación < +/- < * / % < unario/paréntesis */
function evalExpr(expr, vars){
  const T=lexExpr(String(expr)); let p=0;
  const peek=()=>T[p], eat=()=>T[p++];
  const num=v=> typeof v==='number'?v:(typeof v==='boolean'?(v?1:0):(parseFloat(v)||0));
  function primary(){
    let t=eat();
    if(t==='('){ const v=orE(); if(peek()===')') eat(); return v; }
    if(t==='-') return -num(primary());
    if(t==='no') return !truthy(primary());
    if(t==null) return 0;
    if(t[0]==='"') return t.slice(1,-1);
    if(/^\d+\.\d+$/.test(t)) return parseFloat(t);
    if(/^\d+$/.test(t)) return parseInt(t,10);
    if(t==='verdadero') return true;
    if(t==='falso') return false;
    return (t in vars)?vars[t]:0;
  }
  function mulE(){ let v=primary(); while(['*','/','%'].includes(peek())){ const o=eat(), r=primary();
    v = o==='*'?num(v)*num(r): o==='/'?num(v)/num(r): num(v)%num(r); } return v; }
  function addE(){ let v=mulE(); while(peek()==='+'||peek()==='-'){ const o=eat(), r=mulE();
    v = o==='+' ? ((typeof v==='string'||typeof r==='string')?String(v)+String(r):num(v)+num(r)) : num(v)-num(r); } return v; }
  function cmpE(){ let v=addE(); const o=peek();
    if(['>','<','>=','<=','==','=','!=','distinto'].includes(o)){ eat(); const r=addE();
      switch(o){ case '>':return num(v)>num(r); case '<':return num(v)<num(r);
        case '>=':return num(v)>=num(r); case '<=':return num(v)<=num(r);
        case '==': case '=':return v===r||num(v)===num(r);
        case '!=': case 'distinto':return !(v===r||num(v)===num(r)); } }
    return v; }
  function andE(){ let v=cmpE(); while(peek()==='y'){ eat(); const r=cmpE(); v=truthy(v)&&truthy(r); } return v; }
  function orE(){ let v=andE(); while(peek()==='o'){ eat(); const r=andE(); v=truthy(v)||truthy(r); } return v; }
  return orE();
}
function parseProg(lines){
  let i=0;
  function block(minIndent){
    const out=[];
    while(i<lines.length){
      const raw=lines[i];
      if(!raw.trim()){ i++; continue; }
      const ind = raw.length - raw.replace(/^\s+/,'').length;
      if(ind < minIndent) break;
      const line=i, t=raw.trim(); let m;
      if(m=t.match(/^repetir\s+(\d+)\s+veces:?$/i)){ i++; const body=block(ind+1); out.push({op:'repeat',n:+m[1],line,body}); }
      else if(m=t.match(/^si\s+(.+?)\s+entonces:?$/i)){
        i++; const body=block(ind+1); let elseBody=null;
        let j=i; while(j<lines.length && !lines[j].trim()) j++;
        if(j<lines.length && (lines[j].length-lines[j].replace(/^\s+/,'').length)===ind && /^sino:?$/i.test(lines[j].trim())){
          i=j+1; elseBody=block(ind+1);
        }
        out.push({op:'if',cond:m[1],line,body,elseBody});
      }
      else { i++; out.push(parseLeaf(t,line)); }
    }
    return out;
  }
  return block(-1);
}
function parseLeaf(t,line){
  let m;
  if(m=t.match(/^avanzar\s+(\d+)/i))        return {op:'move',v:+m[1],line};
  if(m=t.match(/^girar\s+(\d+)/i))          return {op:'turn',v:+m[1],line};
  if(/^rebotar/i.test(t))                   return {op:'turn',v:180,line};
  if(/^apuntar/i.test(t))                   return {op:'point',line};
  if(m=t.match(/^(?:mostrar|decir)\s+(.+)$/i)) return {op:'show',expr:m[1],line};
  if(/^esperar/i.test(t))                   return {op:'wait',line};
  if(m=t.match(/^([a-zA-Z_]\w*)\s*=\s*(.+)$/)) return {op:'assign',name:m[1],expr:m[2],line};
  return {op:'nop',line};
}
function simulate(lines){
  const ast=parseProg(lines);
  const frames=[]; const vars={};
  const t={x:0,y:0,heading:0}; const trail=[{x:0,y:0}]; const out=[];
  function snap(line, extra){
    frames.push(Object.assign({line, vars:Object.assign({},vars),
      turtle:{x:t.x,y:t.y,heading:t.heading}, trail:trail.map(p=>({x:p.x,y:p.y})), out:out.slice()}, extra||{}));
  }
  function run(nodes){
    for(const n of nodes){
      if(n.op==='repeat'){ snap(n.line); for(let k=0;k<n.n;k++) run(n.body); }
      else if(n.op==='if'){ snap(n.line); if(truthy(evalExpr(n.cond,vars))) run(n.body); else if(n.elseBody) run(n.elseBody); }
      else if(n.op==='move'){ const a=(t.heading-90)*Math.PI/180; t.x+=Math.cos(a)*n.v; t.y+=Math.sin(a)*n.v; trail.push({x:t.x,y:t.y}); snap(n.line); }
      else if(n.op==='turn'){ t.heading+=n.v; snap(n.line); }
      else if(n.op==='assign'){ vars[n.name]=evalExpr(n.expr,vars); snap(n.line,{changed:n.name}); }
      else if(n.op==='show'){ const r=showVal(evalExpr(n.expr,vars)); out.push(r); snap(n.line,{say:r}); }
      else snap(n.line);
    }
  }
  run(ast);
  if(!frames.length) snap(-1);
  return frames;
}

/* -------- dibujo del escenario -------- */
function fitTransform(trail,W,H){
  let a=1e9,b=1e9,c=-1e9,d=-1e9;
  trail.forEach(p=>{a=Math.min(a,p.x);b=Math.min(b,p.y);c=Math.max(c,p.x);d=Math.max(d,p.y);});
  if(!isFinite(a)){a=b=c=d=0;}
  const w=Math.max(c-a,1), h=Math.max(d-b,1), pad=36;
  const s=Math.min((W-2*pad)/w,(H-2*pad)/h,8);
  return {s, ox:(W-w*s)/2 - a*s, oy:(H-h*s)/2 - b*s};
}
function drawFrame(cv, frame, fullTrail){
  const ctx=cv.getContext('2d'), W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(148,163,184,.08)'; ctx.lineWidth=1;
  for(let g=0;g<W;g+=26){ctx.beginPath();ctx.moveTo(g,0);ctx.lineTo(g,H);ctx.stroke();}
  for(let g=0;g<H;g+=26){ctx.beginPath();ctx.moveTo(0,g);ctx.lineTo(W,g);ctx.stroke();}
  const tf=fitTransform(fullTrail,W,H);
  const T=p=>({x:p.x*tf.s+tf.ox, y:p.y*tf.s+tf.oy});
  const tr=frame.trail;
  if(tr.length>1){ ctx.strokeStyle='#38bdf8'; ctx.lineWidth=3; ctx.lineJoin='round'; ctx.lineCap='round';
    ctx.beginPath(); tr.forEach((p,k)=>{const q=T(p); k?ctx.lineTo(q.x,q.y):ctx.moveTo(q.x,q.y);}); ctx.stroke(); }
  const pos=T(frame.turtle), ang=(frame.turtle.heading-90)*Math.PI/180;
  ctx.save(); ctx.translate(pos.x,pos.y); ctx.rotate(ang);
  ctx.fillStyle='#fbbf24'; ctx.beginPath(); ctx.moveTo(15,0); ctx.lineTo(-9,-10); ctx.lineTo(-9,10); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#0f172a'; ctx.beginPath(); ctx.arc(-1,0,3.2,0,7); ctx.fill();
  ctx.restore();
  if(frame.say!=null && frame.say!==''){
    ctx.font='13px system-ui'; const txt='💬 '+frame.say; const tw=ctx.measureText(txt).width;
    let bx=pos.x+12, by=pos.y-24; bx=Math.min(bx,W-tw-16); bx=Math.max(bx,6);
    ctx.fillStyle='rgba(15,23,42,.92)'; ctx.strokeStyle='#334155';
    ctx.beginPath(); ctx.roundRect(bx-6,by-16,tw+12,24,8); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#e2e8f0'; ctx.fillText(txt,bx,by);
  }
}

/* -------- montar escenario interactivo -------- */
function fmt(v){ if(typeof v==='boolean') return v?'verdadero':'falso'; return typeof v==='string' ? '"'+v+'"' : v; }
function codeLinesHtml(lines){
  return lines.map((l,i)=>`<div class="cline" data-l="${i}">${paint(l)||' '}</div>`).join('');
}
function simulatable(lines){
  const j=lines.join('\n');
  return /\b(avanzar|girar|rebotar|mostrar|decir|repetir|si)\b/i.test(j) || lines.some(l=>/^\s*[a-zA-Z_]\w*\s*=\s*.+/.test(l));
}
function mountStage(container, lines, opts){
  opts=opts||{};
  const code=lines.join('\n');
  const hasMove=/\b(avanzar|girar|rebotar)\b/i.test(code);
  const hasVar=lines.some(l=>/^\s*[a-zA-Z_]\w*\s*=\s*.+/.test(l));
  const hasShow=/\b(mostrar|decir)\b/i.test(code);
  const frames=simulate(lines);
  const full=frames[frames.length-1].trail;
  container.innerHTML =
    `<div class="cbhdr">💻 La computadora ejecuta tu programa línea por línea:</div>`+
    `<div class="cblock">${codeLinesHtml(lines)}</div>`+
    (hasMove?'<canvas class="stcanvas" width="320" height="200"></canvas>':'')+
    (hasVar?'<div class="vpanel"></div>':'')+
    (hasShow?'<div class="out"></div>':'')+
    `<div class="runctrl">
       <button class="rbtn" data-a="play">▶ Ejecutar</button>
       <button class="rbtn ghost" data-a="step">⏭ Paso</button>
       <button class="rbtn ghost" data-a="reset">↺</button>
     </div>`;
  const codeEl=container.querySelector('.cblock');
  const cv=container.querySelector('.stcanvas');
  const vp=container.querySelector('.vpanel');
  const op=container.querySelector('.out');
  let idx=-1, timer=null;
  function paintFrame(i){
    idx=i;
    const f = i<0 ? {line:-1,vars:{},turtle:{x:0,y:0,heading:0},trail:[{x:0,y:0}],out:[]} : frames[i];
    codeEl.querySelectorAll('.cline').forEach(el=>el.classList.toggle('hot',+el.dataset.l===f.line));
    if(cv) drawFrame(cv,f,full);
    if(vp) vp.innerHTML = Object.keys(f.vars).length
      ? Object.keys(f.vars).map(k=>`<span class="vchip ${f.changed===k?'chg':''}">${k} = <b>${fmt(f.vars[k])}</b></span>`).join('')
      : '<span class="muted" style="font-size:.8rem">(sin variables todavía)</span>';
    if(op) op.innerHTML = f.out.length ? '🖥️ '+f.out.map(escapeHtml).join('   ')
      : '<span class="muted" style="font-size:.82rem">🖥️ pantalla</span>';
  }
  function stop(){ if(timer){clearInterval(timer);timer=null;} }
  function play(){ stop(); if(idx>=frames.length-1) idx=-1; timer=setInterval(()=>{
      if(idx>=frames.length-1){stop();return;} paintFrame(idx+1); }, 700); paintFrame(idx+1); }
  function step(){ stop(); if(idx>=frames.length-1) idx=-1; paintFrame(idx+1); }
  container.querySelector('[data-a=play]').onclick=play;
  container.querySelector('[data-a=step]').onclick=step;
  container.querySelector('[data-a=reset]').onclick=()=>{stop();paintFrame(-1);};
  paintFrame(-1);
  if(opts.autoplay) play();
}

/* -------------------- ARRANCAR SALA -------------------- */
function startSala(id){
  let sala, ejs;
  if(id==='mezcla'){
    sala = {id:'mezcla', emoji:'🎲', nom:'Modo Mezcla', concepto:'Todos los conceptos'};
    ejs = shuffle(SALAS.flatMap(s=>s.ejs.map(e=>Object.assign({},e,{concepto:s.concepto})))).slice(0,8);
  } else {
    sala = SALAS.find(s=>s.id===id);
    ejs = shuffle(sala.ejs.map(e=>Object.assign({},e,{concepto:sala.concepto})));
  }
  cur = {sala, ejs, i:0, puntos:0, streak:0, answered:false};
  render();
}

/* -------------------- RENDER EJERCICIO -------------------- */
function render(){
  if(cur.i >= cur.ejs.length){ return finSala(); }
  const ej = cur.ejs[cur.i], n=cur.ejs.length, pct=Math.round(cur.i/n*100);
  let h = `<div class="topbar">
      <button class="backb" onclick="menu()">← Salas</button>
      <div class="progtext">${cur.sala.emoji} ${cur.i+1}/${n} · <span class="score">${cur.puntos} pts</span></div>
    </div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    <div class="card">
      <div class="concepto big">📚 Concepto: ${ej.concepto}</div>
      <div class="consigna">${ej.consigna}</div>`;

  if(ej.svg) h += `<div class="flow">${ej.svg}</div>`;
  if(ej.code) h += `<div class="cbhdr">💻 Este es un programa — la compu lo ejecuta:</div><div class="code">${paint(ej.code)}</div>`;

  if(ej.type==='order')    h += renderOrder(ej);
  else if(ej.type==='bug') h += renderBug(ej);
  else                     h += renderChoice(ej);

  h += `<div id="fb"></div></div>`;
  app.innerHTML = h;
  cur.answered=false;
  if(ej.type==='order') mountOrder(ej);
}

/* ---- opción múltiple (mc / fill) ---- */
function renderChoice(ej){
  const mono = ej.type==='fill';
  const opts = ej._opts || (ej._opts = shuffle(ej.opts.map((t,i)=>({txt:t, ok:i===ej.correcta}))));
  let h='<div class="opts">';
  opts.forEach((o,idx)=> h+=`<button class="opt ${mono?'mono':''}" onclick="answerChoice(${idx})">${escapeHtml(o.txt)}</button>`);
  return h+'</div>';
}
function answerChoice(idx){
  if(cur.answered) return; cur.answered=true;
  const ej=cur.ejs[cur.i];
  app.querySelectorAll('.opt').forEach((b,i)=>{ b.disabled=true;
    if(ej._opts[i].ok) b.classList.add('ok'); else if(i===idx) b.classList.add('no'); });
  feedback(ej._opts[idx].ok, ej.explica);
}

/* ---- cazá el error (bug) ---- */
function renderBug(ej){
  let h='<div class="opts">';
  ej.lineas.forEach((l,idx)=> h+=`<button class="opt mono" onclick="answerBug(${idx})">${escapeHtml(l===''?' ':l)}</button>`);
  return h+'</div><p class="muted" style="font-size:.82rem;margin-top:8px">Tocá la línea que tiene el error 🐞</p>';
}
function answerBug(idx){
  if(cur.answered) return; cur.answered=true;
  const ej=cur.ejs[cur.i];
  app.querySelectorAll('.opt').forEach((b,i)=>{ b.disabled=true;
    if(i===ej.bug) b.classList.add('ok'); else if(i===idx) b.classList.add('no'); });
  feedback(idx===ej.bug, ej.explica);
}

/* ---- ordená el código (parsons) ---- */
let orderState;
function renderOrder(ej){
  return `<div class="parsons">
    <div class="pcol"><h4>Bloques disponibles</h4><div class="pbin" id="pbin"></div></div>
    <div class="pcol"><h4>Tu programa</h4><div class="pbuild" id="pbuild"></div></div>
  </div>
  <div id="stageOrder"></div>
  <button class="btn" id="checkBtn" onclick="checkOrder()" disabled>Comprobar ✓</button>`;
}
function mountOrder(ej){
  orderState = { bin: shuffle(ej.correcto.map((t,i)=>({t,i}))), build:[] };
  drawOrder();
}
function drawOrder(){
  const ej=cur.ejs[cur.i];
  const bin=document.getElementById('pbin'), build=document.getElementById('pbuild');
  bin.innerHTML = orderState.bin.length ? '' : '<div class="emptyhint">— vacío —</div>';
  orderState.bin.forEach((o)=>{
    const el=document.createElement('div'); el.className='pline'; el.innerHTML=paint(o.t);
    el.onclick=()=>{ orderState.bin.splice(orderState.bin.indexOf(o),1); orderState.build.push(o); drawOrder(); }; bin.appendChild(el);
  });
  build.innerHTML = orderState.build.length ? '' : '<div class="emptyhint">Tocá los bloques en orden ↑</div>';
  orderState.build.forEach((o)=>{
    const el=document.createElement('div'); el.className='pline'; el.innerHTML=paint(o.t);
    el.onclick=()=>{ orderState.build.splice(orderState.build.indexOf(o),1); orderState.bin.push(o); drawOrder(); }; build.appendChild(el);
  });
  const full = orderState.bin.length===0 && orderState.build.length>0;
  const btn=document.getElementById('checkBtn'); if(btn) btn.disabled=!full;
  // escenario "probar mi orden"
  const stg=document.getElementById('stageOrder');
  if(stg){
    const lines=orderState.build.map(o=>o.t);
    if(full && simulatable(lines)){
      stg.innerHTML='<div class="sttitle" style="margin-top:12px">🎬 Probá tu orden antes de comprobar:</div><div class="stage" id="stgO"></div>';
      mountStage(document.getElementById('stgO'), lines);
    } else stg.innerHTML='';
  }
}
function checkOrder(){
  if(cur.answered) return;
  const ej=cur.ejs[cur.i]; let good=true;
  const built=orderState.build.map(o=>o.t);   // comparar por TEXTO (soporta bloques repetidos)
  document.querySelectorAll('#pbuild .pline').forEach((el,k)=>{
    el.classList.add('locked'); el.onclick=null;
    const ok=built[k]===ej.correcto[k]; el.classList.add(ok?'okline':'noline'); if(!ok) good=false;
  });
  document.getElementById('checkBtn').disabled=true;
  document.querySelectorAll('#pbin .pline').forEach(el=>el.onclick=null);
  document.getElementById('stageOrder').innerHTML='';
  cur.answered=true;
  let extra=ej.explica;
  if(!good){
    const orden=ej.correcto.map((t,k)=>`${k+1}. ${t}`).join('<br>');
    extra += `<div style="margin-top:10px;padding:10px;background:#0b1220;border-radius:8px;font-size:.88rem"><b>✅ El orden correcto es:</b><br>${orden}</div>`;
  }
  feedback(good, extra);
}

/* -------------------- FEEDBACK -------------------- */
function feedback(good, explica){
  if(good){ if(cur.scored!==cur.i){ cur.puntos++; cur.streak++; cur.scored=cur.i; } } else { cur.streak=0; }
  const ej=cur.ejs[cur.i];
  const fb=document.getElementById('fb');
  const racha = cur.streak>=3 ? `<div class="streak">🔥 ¡Racha de ${cur.streak}!</div>` : '';
  const last = cur.i+1>=cur.ejs.length;
  const retryBtn = good ? '' : `<button class="btn" onclick="retry()">🔄 Corregir y reintentar</button>`;
  const nextBtn  = `<button class="btn ${good?'':'ghost'}" onclick="next()">${last?'Ver resultado 🏁':(good?'Siguiente →':'Saltear sin corregir →')}</button>`;
  fb.innerHTML = `<div class="fb ${good?'good':'bad'}">
      <span class="t">${good?'¡Correcto! 🎉':'Todavía no 🤔 — leé esto y volvé a intentar:'}</span>${explica}${racha}
    </div>
    <div id="stageWrap"></div>
    ${retryBtn}${nextBtn}`;
  // el escenario animado (que revela el resultado) solo al acertar, para no arruinar el reintento
  if(good && runnableStage(ej) && ej.type!=='order'){
    const sw=document.getElementById('stageWrap');
    sw.innerHTML='<div class="sttitle" style="margin-top:14px">🎬 Mirá cómo corre este código:</div><div class="stage" id="stgFb"></div>';
    mountStage(document.getElementById('stgFb'), getRunLines(ej), {autoplay:true});
  }
  fb.scrollIntoView({behavior:'smooth', block:'nearest'});
}
function retry(){ render(); }   // mismo ejercicio, intento nuevo (no reshuffle de opciones en mc)
function next(){ cur.i++; render(); }

/* -------------------- ESTUDIO DE DIBUJO (modo libre) -------------------- */
function shapeHint(ang){
  const nice={30:'un dodecágono (12 lados, ¡casi un círculo!) ⭕',36:'una estrella / decágono ⭐',45:'un octágono (8 lados)',60:'un hexágono (6 lados) ⬡',
    72:'un pentágono (5 lados) ⬠',90:'un cuadrado 🟦',120:'un triángulo 🔺',144:'una estrella de 5 puntas ⭐',180:'una línea que va y vuelve ➖'};
  if(nice[ang]) return `Con giro <b>${ang}°</b> intentás dibujar <b>${nice[ang]}</b>.`;
  if(360%ang===0) return `Con giro <b>${ang}°</b> la figura cierra en <b>${360/ang} lados</b> (360 ÷ ${ang}).`;
  return `Giro <b>${ang}°</b>: no divide justo a 360, ¡así que sale una espiral o figura abierta! 🌀`;
}
function estudio(){
  cur=null;
  app.innerHTML = `<div class="topbar">
      <button class="backb" onclick="menu()">← Salas</button>
      <div class="progtext">🎨 Estudio de dibujo</div>
    </div>
    <div class="card">
      <h2>🎨 Estudio de dibujo</h2>
      <p class="muted">Movés las perillas y la tortuga <b>dibuja con tu programa</b>. Cambiá el <b>giro</b> y mirá cómo aparecen triángulos, cuadrados, estrellas y espirales. ¡Estás haciendo arte con código!</p>
      <label>🔁 Repeticiones: <b id="vRep">6</b></label>
      <input type="range" id="sRep" class="slider" min="2" max="24" value="6">
      <label>📏 Largo del paso: <b id="vLen">80</b></label>
      <input type="range" id="sLen" class="slider" min="15" max="120" step="5" value="80">
      <label>🔄 Giro (grados): <b id="vAng">120</b></label>
      <input type="range" id="sAng" class="slider" min="10" max="180" step="1" value="120">
      <div id="estHint" class="hint"></div>
      <div class="cbhdr">💻 Tu programa (esto es lo que ejecuta la compu):</div>
      <div class="code" id="estCode"></div>
      <canvas id="estCanvas" class="stcanvas" width="330" height="250"></canvas>
      <button class="btn ghost" id="estAnim">🎬 Verla dibujarse paso a paso</button>
      <div id="estStage"></div>
    </div>`;
  const G=id=>document.getElementById(id);
  function linesNow(){ return [`repetir ${+G('sRep').value} veces:`, `    avanzar ${+G('sLen').value}`, `    girar ${+G('sAng').value} grados`]; }
  function upd(){
    const rep=+G('sRep').value, len=+G('sLen').value, ang=+G('sAng').value;
    G('vRep').textContent=rep; G('vLen').textContent=len; G('vAng').textContent=ang;
    const lines=linesNow();
    G('estCode').innerHTML=paint(lines.join('\n'));
    const f=simulate(lines); const last=f[f.length-1];
    drawFrame(G('estCanvas'), last, last.trail);
    G('estHint').innerHTML=shapeHint(ang);
    G('estStage').innerHTML='';
  }
  ['sRep','sLen','sAng'].forEach(id=>G(id).oninput=upd);
  G('estAnim').onclick=()=>{ G('estStage').innerHTML='<div class="stage" id="estS"></div>'; mountStage(G('estS'), linesNow(), {autoplay:true}); };
  upd();
}

/* -------------------- MODO Jr (nivel ScratchJr, sin lectura, con voz) -------------------- */
const JR_ICON={U:'⬆️',D:'⬇️',L:'⬅️',R:'➡️'};
const JR=[
  // fáciles
  { char:'🐢', goal:'⭐', cols:3, rows:1, start:{c:0,r:0}, target:{c:2,r:0} },
  { char:'🐱', goal:'🍎', cols:4, rows:1, start:{c:0,r:0}, target:{c:3,r:0} },
  { char:'🚗', goal:'🏁', cols:5, rows:1, start:{c:0,r:0}, target:{c:4,r:0} },
  { char:'🐰', goal:'🥕', cols:3, rows:2, start:{c:0,r:1}, target:{c:2,r:0} },
  // difíciles: grillas más grandes, giros y paredes 🧱
  { char:'🐢', goal:'⭐', cols:4, rows:3, start:{c:0,r:2}, target:{c:3,r:0} },
  { char:'🐱', goal:'🍎', cols:4, rows:3, start:{c:0,r:0}, target:{c:3,r:2}, walls:[{c:1,r:1},{c:2,r:1}] },
  { char:'🚗', goal:'🏁', cols:5, rows:3, start:{c:0,r:1}, target:{c:4,r:1}, walls:[{c:2,r:1}] },
  { char:'🐭', goal:'🧀', cols:5, rows:4, start:{c:0,r:3}, target:{c:4,r:0}, walls:[{c:2,r:1},{c:2,r:2},{c:2,r:3}] },
  { char:'🐢', goal:'⭐', cols:5, rows:5, start:{c:0,r:4}, target:{c:4,r:0}, walls:[{c:1,r:3},{c:3,r:1},{c:2,r:2}] },
];
function jrWall(m,c,r){ return (m.walls||[]).some(w=>w.c===c&&w.r===r); }
let jrState;
function jrMission(idx){
  cur=null;
  const m=JR[idx];
  jrState={idx, m, prog:[], pos:{c:m.start.c,r:m.start.r}, playing:false};
  jrRender();
}
function jrRender(msg){
  const {m,prog}=jrState, showUD=m.rows>1;
  let cells='';
  for(let r=0;r<m.rows;r++) for(let c=0;c<m.cols;c++){
    const isGoal=(c===m.target.c&&r===m.target.r), isChar=(c===jrState.pos.c&&r===jrState.pos.r), isWall=jrWall(m,c,r);
    cells+=`<div class="jrcell ${isGoal?'goal':''} ${isWall?'wall':''}">${isChar?m.char:(isWall?'🧱':(isGoal?m.goal:''))}</div>`;
  }
  const dots=JR.map((_,k)=>k===jrState.idx?'●':'○').join(' ');
  app.innerHTML=`
    <div class="topbar"><button class="backb" onclick="menu()">←</button>
      <div class="progtext" style="letter-spacing:3px;color:var(--b1)">${dots}</div></div>
    <div class="card jrwrap">
      <div style="font-size:2.6rem;margin:4px 0 8px">${m.char}<span style="font-size:1.6rem;opacity:.5;margin:0 14px">➡️</span>${m.goal}</div>
      <div class="jrgrid" style="grid-template-columns:repeat(${m.cols},56px)">${cells}</div>
      <div class="jrmsg">${msg||''}</div>
      <div class="jrstrip">${prog.length?prog.map(a=>JR_ICON[a]).join(' '):'<span style="opacity:.3;font-size:1.5rem">▫️ ▫️ ▫️</span>'}</div>
      ${showUD?`<div class="jrbtns"><button class="jrbtn" onclick="jrAdd('U')">⬆️</button></div>`:''}
      <div class="jrbtns">
        <button class="jrbtn" onclick="jrAdd('L')">⬅️</button>
        <button class="jrbtn" onclick="jrAdd('R')">➡️</button>
      </div>
      ${showUD?`<div class="jrbtns"><button class="jrbtn" onclick="jrAdd('D')">⬇️</button></div>`:''}
      <div class="jrbtns" style="margin-top:12px">
        <button class="jrgo" onclick="jrRun()">▶</button>
        <button class="jrbtn" onclick="jrClear()">🗑️</button>
      </div>
    </div>`;
}
function jrAdd(a){ if(jrState.playing) return; jrState.prog.push(a); jrRender(); }
function jrClear(){ if(jrState.playing) return; jrState.prog=[]; jrState.pos={c:jrState.m.start.c,r:jrState.m.start.r}; jrRender(); }
function jrRun(){
  if(jrState.playing || !jrState.prog.length) return;
  jrState.playing=true;
  jrState.pos={c:jrState.m.start.c,r:jrState.m.start.r};
  const steps=jrState.prog.slice(); let i=0;
  const tick=()=>{
    if(i>=steps.length){ jrFinish(); return; }
    const a=steps[i++], p=jrState.pos, m=jrState.m;
    let nc=p.c, nr=p.r;
    if(a==='R') nc++; else if(a==='L') nc--; else if(a==='U') nr--; else if(a==='D') nr++;
    if(nc>=0&&nc<m.cols&&nr>=0&&nr<m.rows&&!jrWall(m,nc,nr)){ p.c=nc; p.r=nr; }  // clamp + paredes bloquean
    jrRender(); setTimeout(tick,520);
  };
  setTimeout(tick,300);
}
function jrFinish(){
  const {pos,m,idx}=jrState; jrState.playing=false;
  if(pos.c===m.target.c && pos.r===m.target.r){
    const last=idx>=JR.length-1;
    const msg=app.querySelector('.jrmsg'); if(msg) msg.innerHTML='🎉 🌟 👏';
    const wrap=app.querySelector('.jrwrap');
    if(wrap){ const b=document.createElement('div'); b.className='jrbtns'; b.style.marginTop='12px';
      b.innerHTML = last ? `<button class="jrgo" onclick="menu()">🏆</button>`
                         : `<button class="jrgo" onclick="jrMission(${idx+1})">➡️ 🎈</button>`;
      wrap.appendChild(b); }
  } else {
    const msg=app.querySelector('.jrmsg'); if(msg) msg.innerHTML='🔁 🙂';
    setTimeout(()=>{ jrState.pos={c:jrState.m.start.c,r:jrState.m.start.r}; jrRender(); }, 1100);
  }
}

/* -------------------- FIN DE SALA -------------------- */
function finSala(){
  const total=cur.ejs.length, pts=cur.puntos, ratio=pts/total;
  let med,emoji,msg;
  if(ratio===1){ med='🥇 ¡Oro!'; emoji='🏆'; msg='¡Todas bien! Sos un crack del código.'; }
  else if(ratio>=0.6){ med='🥈 Plata'; emoji='🎉'; msg='¡Muy bien! Ya casi lo dominás.'; }
  else { med='🥉 Bronce'; emoji='💪'; msg='¡Buen intento! Volvé a probar para mejorar.'; }
  if(cur.sala.id!=='mezcla'){ const prev=done[cur.sala.id]; if(!prev||pts>prev.puntos) done[cur.sala.id]={puntos:pts,total}; }
  app.innerHTML = `<div class="card final">
      <div class="big">${emoji}</div>
      <div class="med">${med}</div>
      <div style="font-size:1.3rem;font-weight:700">${pts} / ${total}</div>
      <div class="sub">${msg}</div>
      <button class="btn" onclick="startSala('${cur.sala.id}')">Reintentar 🔄</button>
      <button class="btn ghost" onclick="menu()">← Volver a las salas</button>
    </div>`;
}

/* -------------------- utils -------------------- */
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

menu();
</script>
